<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APA Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>

<style>
:root{
  --ink:#1a1412;
  --muted:#6b5f5a;
  --bg:#fbf6f2;
  --card:#ffffff;
  --line:#e9ddd6;

  --accent:#e84d6e;
  --accent2:#2fbf8f;

  --serif:'Playfair Display', serif;
  --body:'Lora', serif;

  --r:16px;
  --shadow:0 12px 40px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:var(--body);
  background:var(--bg);
  color:var(--ink);
}

.wrap{
  max-width:1000px;
  margin:0 auto;
  padding:40px 18px 120px;
}

/* HEADER */
h1{
  font-family:var(--serif);
  font-size:clamp(2.2rem,5vw,3.6rem);
  margin:0;
}
h1 span{color:var(--accent)}

.sub{
  color:var(--muted);
  font-style:italic;
  margin-top:6px;
}

/* LAYOUT */
.grid{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:18px;
  margin-top:28px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:18px;
  box-shadow:var(--shadow);
}

/* INPUTS */
label{
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
}

input,textarea,select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  margin-top:6px;
  font-family:var(--body);
}

textarea{min-height:90px}

input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--accent);
}

/* BUTTONS */
.btn{
  margin-top:12px;
  padding:12px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:var(--serif);
  font-weight:600;
  color:white;
  background:var(--accent);
}

.btn.secondary{background:var(--accent2)}

.output{
  white-space:pre-wrap;
  background:#1e1715;
  color:#fff2ea;
  padding:14px;
  border-radius:12px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.tab{
  border:1px solid var(--line);
  background:white;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
}

.tab.active{
  background:var(--accent);
  color:white;
  border-color:var(--accent);
}
</style>
</head>

<body>
<div class="wrap">

<h1>APA <span>Studio</span></h1>
<div class="sub">Citation engine + annotated bibliography + export tools</div>

<div class="tabs">
  <button class="tab active" onclick="show('cite')">Citations</button>
  <button class="tab" onclick="show('annot')">Annotated</button>
</div>

<div class="grid">

<!-- LEFT -->
<div>

<!-- CITATION -->
<div class="card panel" id="cite">

  <label>Author</label>
  <input id="a">

  <label style="margin-top:10px;">Year</label>
  <input id="y">

  <label style="margin-top:10px;">Title</label>
  <input id="t">

  <button class="btn" onclick="genCitation()">Generate Citation</button>

  <button class="btn secondary" onclick="exportDoc()">Export DOCX</button>
  <button class="btn secondary" onclick="exportPDF()">Export PDF</button>

</div>

<!-- ANNOTATED -->
<div class="card panel" id="annot" style="display:none">

  <label>Citation Fields</label>
  <input id="aa" placeholder="Author">
  <input id="ay" placeholder="Year">
  <input id="at" placeholder="Title">

  <label style="margin-top:10px;">Summary</label>
  <textarea id="s"></textarea>

  <label>Evaluation</label>
  <textarea id="e"></textarea>

  <label>Reflection</label>
  <textarea id="r"></textarea>

  <button class="btn" onclick="genAnnot()">Generate Annotated Entry</button>

</div>

</div>

<!-- RIGHT -->
<div class="card">
  <label>Output</label>
  <div class="output" id="out"></div>
</div>

</div>

</div>

<script>
let lastText = "";

/* SAFE TAB SWITCH */
function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
  document.getElementById(id).style.display='block';

  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

/* APA ENGINE (core) */
function citation(a,y,t){
  a = a || "Author unknown";
  y = y || "n.d.";
  t = t || "Untitled";
  return `${a}. (${y}). ${t}.`;
}

/* CITATION */
function genCitation(){
  const txt = citation(
    document.getElementById('a').value,
    document.getElementById('y').value,
    document.getElementById('t').value
  );

  lastText = txt;
  document.getElementById('out').textContent = txt;
}

/* ANNOTATED */
function genAnnot(){
  const base = citation(
    document.getElementById('aa').value,
    document.getElementById('ay').value,
    document.getElementById('at').value
  );

  const s = document.getElementById('s').value;
  const e = document.getElementById('e').value;
  const r = document.getElementById('r').value;

  const full =
`${base}

Summary: ${s}

Evaluation: ${e}

Reflection: ${r}`;

  lastText = full;
  document.getElementById('out').textContent = full;
}

/* DOCX EXPORT */
function exportDoc(){
  const { Document, Packer, Paragraph } = window.docx;

  const doc = new Document({
    sections:[{
      children:[new Paragraph(lastText || "")]
    }]
  });

  Packer.toBlob(doc).then(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "APA_Export.docx";
    a.click();
  });
}

/* PDF EXPORT (print-safe) */
function exportPDF(){
  const w = window.open("");
  w.document.write(`<pre style="font-size:14px;font-family:serif;white-space:pre-wrap">${lastText}</pre>`);
  w.print();
}
</script>

</body>
</html>
