<script>

/* =========================================
DOI CLEANUP
========================================= */

function cleanDOI(v){

  if(!v)return null;

  return v
    .trim()
    .replace(/^https?:\/\/doi\.org\//i,'')
    .replace(/^doi:\s*/i,'')
    .replace(/\s+/g,'');
}

/* =========================================
REPLACE doi()
========================================= */

function doi(d,u){

  d=cleanDOI(d);

  u=clean(u);

  if(d){
    return `https://doi.org/${d}`;
  }

  return u;
}

/* =========================================
AUTO-SAVE DRAFTS
========================================= */

function saveDraft(){

  try{

    localStorage.setItem(
      'apa_draft',
      JSON.stringify({
        type:currentType,
        data:collectData('a_',currentType)
      })
    );

  }catch(err){
    console.error(err);
  }
}

function loadDraft(){

  try{

    const raw=
      localStorage.getItem('apa_draft');

    if(!raw)return;

    const draft=JSON.parse(raw);

    if(!draft)return;

    if(draft.type){

      currentType=draft.type;

      buildTypeGrid(
        'typeGrid',
        ()=>currentType,
        (id)=>{
          currentType=id;

          renderForm(
            'formCard',
            currentType,
            'a_'
          );

          document
            .getElementById('outputWrap')
            .classList.remove('visible');
        }
      );

      renderForm(
        'formCard',
        currentType,
        'a_'
      );
    }

    if(draft.data){

      setTimeout(()=>{

        const data=draft.data;

        if(data.authors){

          const list=
            document.getElementById('a_aList');

          if(list){

            list.innerHTML='';

            data.authors.forEach(a=>{

              addRow('a_aList');

              const rows=
                list.querySelectorAll('.author-row');

              const row=rows[rows.length-1];

              row.querySelector('.al').value=
                a.last || '';

              row.querySelector('.af').value=
                a.first || '';
            });
          }
        }

        Object.entries(data).forEach(([k,v])=>{

          const el=
            document.getElementById(`a_f_${k}`);

          if(el && typeof v==='string'){
            el.value=v;
          }
        });

      },50);
    }

  }catch(err){
    console.error(err);
  }
}

/* =========================================
AUTO-COPY AFTER GENERATE
========================================= */

const oldGenerate=generate;

generate=async function(){

  oldGenerate();

  await copyText(plain(lastRaw));

  const btn=document.getElementById('copyBtn');

  btn.textContent='Copied!';
  btn.classList.add('copied');

  setTimeout(()=>{

    btn.textContent='Copy';

    btn.classList.remove('copied');

  },2000);

  saveDraft();
};

/* =========================================
LIVE PREVIEW
========================================= */

function updateLivePreview(){

  try{

    const data=
      collectData('a_',currentType);

    const raw=
      SCHEMAS[currentType].fn(data);

    lastRaw=raw;

    const output=
      document.getElementById('outputWrap');

    document.getElementById('citationBox').innerHTML=
      renderI(raw);

    if(raw.trim()){
      output.classList.add('visible');
    }

  }catch(err){
    console.error(err);
  }
}

/* =========================================
EXPORT BIBLIOGRAPHY
========================================= */

function exportBibliography(){

  if(!citHistory.length)return;

  const txt=
    citHistory
      .map(c=>plain(c.raw))
      .join('\n\n');

  const blob=
    new Blob(
      [txt],
      {type:'text/plain'}
    );

  const a=document.createElement('a');

  a.href=
    URL.createObjectURL(blob);

  a.download='bibliography.txt';

  a.click();

  URL.revokeObjectURL(a.href);
}

/* =========================================
ADD EXPORT BUTTON TO UI
========================================= */

function injectExportButton(){

  const controls=
    document.querySelector('.history-controls');

  if(!controls)return;

  if(document.getElementById('exportBtn'))return;

  const btn=document.createElement('button');

  btn.id='exportBtn';

  btn.className='export-btn';

  btn.textContent='Export bibliography';

  btn.onclick=exportBibliography;

  controls.appendChild(btn);
}

/* =========================================
LIVE EVENTS
========================================= */

document.addEventListener('input',e=>{

  saveDraft();

  updateLivePreview();
});

/* =========================================
INITIALIZE
========================================= */

window.addEventListener('DOMContentLoaded',()=>{

  injectExportButton();

  loadDraft();

  updateLivePreview();
});

</script>
