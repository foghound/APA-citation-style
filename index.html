<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APA Citation Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* =========================
BASE
========================= */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --pink:#E8366A;
  --green:#3DB87A;
  --ink:#1C1410;
  --muted:#7A6A5A;
  --bg:#FFF8F0;
  --surface:#fff;
  --rule:#E8D8C8;
  --r:10px;
  --shadow:0 6px 24px rgba(0,0,0,.08);

  --serif:'Playfair Display',serif;
  --body:'Lora',serif;
}

body{
  font-family:var(--body);
  background:var(--bg);
  color:var(--ink);
  line-height:1.7;
}

.page{
  max-width:900px;
  margin:0 auto;
  padding:24px 16px 80px;
}

/* =========================
HEADER
========================= */
h1{
  font-family:var(--serif);
  font-size:2.2rem;
  margin-bottom:6px;
}

.sub{
  color:var(--muted);
  font-style:italic;
  margin-bottom:20px;
}

/* =========================
LAYOUT
========================= */
.card{
  background:var(--surface);
  border:1px solid var(--rule);
  border-radius:var(--r);
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
}

input,textarea{
  width:100%;
  padding:10px;
  border:1px solid var(--rule);
  border-radius:8px;
  font-size:16px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-family:var(--body);
}

.primary{
  background:var(--pink);
  color:#fff;
}

/* =========================
OUTPUT
========================= */
.output{
  background:#111;
  color:#fff;
  padding:14px;
  border-radius:10px;
  white-space:pre-wrap;
}

.small{
  font-size:13px;
  color:var(--muted);
}

/* =========================
MOBILE
========================= */
@media(max-width:600px){
  h1{font-size:1.8rem}
  input,textarea{font-size:16px}
}
</style>
</head>

<body>
<div class="page">

<h1>APA Citation Builder</h1>
<div class="sub">Fast, clean citations with auto-formatting.</div>

<div class="card">

  <div class="grid">

    <div>
      <label>Author Last Name</label>
      <input id="last">
    </div>

    <div>
      <label>Author First Name</label>
      <input id="first">
    </div>

    <div>
      <label>Year</label>
      <input id="year">
    </div>

    <div>
      <label>Title</label>
      <input id="title">
    </div>

    <div>
      <label>Source / Journal</label>
      <input id="source">
    </div>

    <div>
      <label>DOI or URL</label>
      <input id="link">
    </div>

    <button class="primary" onclick="generate()">Generate</button>
    <button onclick="copy()">Copy</button>

  </div>
</div>

<div class="card">
  <div class="small">Live Output</div>
  <div id="out" class="output"></div>
</div>

</div>

<script>

/* =========================
CORE HELPERS
========================= */

function v(id){
  return document.getElementById(id).value.trim();
}

function formatAuthor(){
  const l=v('last');
  const f=v('first');
  if(!l && !f) return '(Author unknown)';
  if(!l) return f;
  if(!f) return l;
  return `${l}, ${f[0]}.`;
}

function cleanDOI(x){
  if(!x) return '';
  return x.replace(/^https?:\/\/doi.org\//,'')
          .replace(/^doi:/i,'')
          .trim();
}

/* =========================
APA FORMAT (SIMPLE JOURNAL STYLE)
========================= */

function generate(){
  const author = formatAuthor();
  const year = v('year') || 'n.d.';
  const title = v('title') || '[No title]';
  const source = v('source') || '[Source]';
  let link = cleanDOI(v('link'));

  if(link && !link.startsWith('http')){
    link = 'https://doi.org/' + link;
  }

  const citation =
`${author} (${year}). ${title}. ${source}. ${link}`;

  document.getElementById('out').textContent = citation;

  localStorage.setItem('lastCitation', citation);
}

/* =========================
COPY (iOS SAFE)
========================= */

async function copy(){
  const text = document.getElementById('out').textContent;

  try{
    await navigator.clipboard.writeText(text);
  }catch(e){
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

/* =========================
AUTO LOAD LAST
========================= */

window.onload = () => {
  const last = localStorage.getItem('lastCitation');
  if(last){
    document.getElementById('out').textContent = last;
  }
};

</script>
</body>
</html>
